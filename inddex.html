<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewards Unlocked! - Coin Master Free Gift</title>
    <style>
        /* Base Reset & Font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Arial Bold', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0f3d59 linear-gradient(135deg, #165378 0%, #0a273b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Mobile Only Container */
        .mobile-viewport {
            width: 100%;
            max-width: 410px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Logo Diperlebar & Didempetkan ke Kotak */
        .game-logo {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            margin-bottom: -15px; /* Dempet memotong ke area banner */
            z-index: 2;
            position: relative;
        }

        /* Animasi Efek Cahaya Belakang (Ray/Glow) */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(243, 186, 66, 0.4) 0%, rgba(243, 186, 66, 0) 70%);
            top: 25%;
            z-index: 0;
            animation: pulseGlow 3s infinite ease-in-out;
        }

        /* Main Popup Box Modern */
        .reward-card {
            background: linear-gradient(180deg, #fff7e9 0%, #edd4b3 100%);
            border: 5px solid #bd8f60;
            border-radius: 28px;
            padding: 45px 20px 30px 20px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 
                        inset 0 4px 0 rgba(255,255,255,0.8),
                        inset 0 -6px 0 rgba(139,94,40,0.2);
            position: relative;
            z-index: 1;
        }

        /* Banner Atas Pop-up */
        .reward-banner {
            background: linear-gradient(180deg, #ffc83b 0%, #ff9000 100%);
            border: 3px solid #5a3404;
            border-radius: 14px;
            color: #ffffff;
            padding: 10px 35px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 0px #5a3404, 2px 3px 4px rgba(0,0,0,0.4);
            display: inline-block;
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        /* Headline */
        .headline {
            color: #43290f;
            font-size: 22px;
            line-height: 1.3;
            margin-top: 10px;
            margin-bottom: 35px;
            text-shadow: 0 1px 0 #ffffff;
        }

        /* Grid Items */
        .items-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            padding: 0 5px;
        }

        .reward-box {
            width: 47%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: floatItem 3s infinite ease-in-out;
        }

        /* Jeda delay animasi pada item kedua */
        .reward-box:nth-child(2) {
            animation-delay: 1.5s;
        }

        /* Styling Gambar Asset */
        .asset-img {
            width: 100%;
            max-width: 110px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
            margin-bottom: 15px;
        }

        /* Teks Jumlah Angka (+600K / Spins) */
        .amount-text {
            color: #0099ff;
            font-size: 22px;
            letter-spacing: 0.5px;
            text-shadow: 2.5px 2.5px 0px #ffffff, 
                         -2.5px -2.5px 0px #ffffff, 
                         2.5px -2.5px 0px #ffffff, 
                         -2.5px 2.5px 0px #ffffff,
                         0px 5px 8px rgba(0,0,0,0.3);
        }

        /* Tombol Modern Collect Berkilau */
        .btn-collect {
            background: linear-gradient(180deg, #8cee2b 0%, #4da203 100%);
            border: 3px solid #234f02;
            border-radius: 16px;
            color: #ffffff;
            padding: 16px 0;
            width: 85%;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #224c02;
            box-shadow: 0 8px 0px #234f02, 0 12px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        /* Efek Kilatan Cahaya di Tombol (Shine Effect) */
        .btn-collect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: none;
            animation: shineEffect 3.5s infinite linear;
        }

        .btn-collect:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px #234f02, 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Keyframes Animasi */
        @keyframes floatItem {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        @keyframes shineEffect {
            0% { left: -60%; }
            15% { left: 130%; }
            100% { left: 130%; }
        }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <!-- Logo Paling Atas (Sekarang Lebar & Dempet) -->
        <img src="logo.png" alt="Coin Master" class="game-logo">

        <!-- Efek Glow Belakang -->
        <div class="bg-glow"></div>

        <!-- Box Utama -->
        <div class="reward-card">
            
            <!-- Banner Judul -->
            <div class="reward-banner">Congratulations!</div>
            
            <!-- Headline -->
            <h1 class="headline">Coin Master has gifted you spins and chests!</h1>
            
            <!-- Area Grid Hadiah Dinamis -->
            <div class="items-grid">
                <!-- Box Kiri (Chest/Box) -->
                <div class="reward-box">
                    <img src="box.png" alt="Chest Reward" class="asset-img">
                    <div class="amount-text">X1 CHEST</div>
                </div>
                
                <!-- Box Kanan (Energy Spins) -->
                <div class="reward-box">
                    <img src="energy.png" alt="Spins Reward" class="asset-img">
                    <div class="amount-text">+100 SPINS</div>
                </div>
            </div>
            
            <!-- Tombol Collect -->
            <a href="https://google.com" class="btn-collect">Collect</a>
            
        </div>
    </div>

</body>
</html>
